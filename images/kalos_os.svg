  <rect x="62" y="378" width="4" height="12" fill="#44ff88"/><text x="70" y="387" font-size="8" fill="#ccddff">[vesa/gpu]</text><text x="218" y="387" font-size="8" fill="#44ff88">2%</text><text x="270" y="387" font-size="8" fill="#88aacc">256 KB</text><text x="330" y="387" font-size="8" fill="#44ff88">Running</text>
  <rect x="62" y="392" width="4" height="12" fill="#44ff88"/><text x="70" y="401" font-size="8" fill="#ccddff">[net/e1000]</text><text x="218" y="401" font-size="8" fill="#44ff88">1%</text><text x="270" y="401" font-size="8" fill="#88aacc">64 KB</text><text x="330" y="401" font-size="8" fill="#44ff88">Running</text>
  <rect x="62" y="406" width="4" height="12" fill="#8888ff"/><text x="70" y="415" font-size="8" fill="#ccddff">[idle]</text><text x="218" y="415" font-size="8" fill="#aaaacc">0%</text><text x="270" y="415" font-size="8" fill="#88aacc">4 KB</text><text x="330" y="415" font-size="8" fill="#8888ff">Sleeping</text>
  <rect x="62" y="420" width="4" height="12" fill="#44ff88"/><text x="70" y="429" font-size="8" fill="#ccddff">[irq/0-timer]</text><text x="218" y="429" font-size="8" fill="#44ff88">3%</text><text x="270" y="429" font-size="8" fill="#88aacc">8 KB</text><text x="330" y="429" font-size="8" fill="#44ff88">Running</text>
  <rect x="62" y="434" width="4" height="12" fill="#44ff88"/><text x="70" y="443" font-size="8" fill="#ccddff">[kalfs]</text><text x="218" y="443" font-size="8" fill="#44ff88">1%</text><text x="270" y="443" font-size="8" fill="#88aacc">128 KB</text><text x="330" y="443" font-size="8" fill="#44ff88">Running</text>
  <rect x="62" y="448" width="4" height="12" fill="#44ff88"/><text x="70" y="457" font-size="8" fill="#ccddff">[fat32]</text><text x="218" y="457" font-size="8" fill="#44ff88">0%</text><text x="270" y="457" font-size="8" fill="#88aacc">64 KB</text><text x="330" y="457" font-size="8" fill="#44ff88">Running</text>

