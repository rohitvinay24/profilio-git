  <text x="402" y="350" font-size="8" fill="#4488ff">FS:  </text><text x="432" y="350" font-size="8" fill="#cccccc"> KalFS + FAT32 + ext2</text>
  <text x="402" y="362" font-size="8" fill="#4488ff">GPU: </text><text x="432" y="362" font-size="8" fill="#cccccc"> Bochs VGA @ 1366x768x32</text>
  <text x="402" y="374" font-size="8" fill="#aaaacc"> </text>
  <text x="402" y="388" font-size="8" fill="#44ff88">root@kalos</text><text x="458" y="388" font-size="8" fill="#cccccc">:/# </text><text x="474" y="388" font-size="8" fill="#ffffff">ls /kernel</text>
  <text x="402" y="400" font-size="8" fill="#88aacc">kernel.c  gui.c  net.c  e1000.c  ahci.c  acpi.c  pci.c</text>
  <text x="402" y="412" font-size="8" fill="#88aacc">kal_editor.c  file_manager.c  task_manager.c</text>
  <text x="402" y="428" font-size="8" fill="#44ff88">root@kalos</text><text x="458" y="428" font-size="8" fill="#cccccc">:/# </text>
