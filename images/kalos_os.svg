  <rect x="68" y="76" width="308" height="16" rx="2" fill="#1e3050"/>
  <text x="78" y="87" font-size="9" fill="#ccddff">📄  kernel.c</text>
  <text x="290" y="87" font-size="9" fill="#4466aa">237 KB</text>
  <rect x="68" y="94" width="308" height="16" rx="2" fill="transparent"/>
  <text x="78" y="105" font-size="9" fill="#aabbdd">📄  gui.c</text>
  <text x="290" y="105" font-size="9" fill="#4466aa">198 KB</text>
  <rect x="68" y="112" width="308" height="16" rx="2" fill="#1e3050"/>
  <text x="78" y="123" font-size="9" fill="#aabbdd">📄  file_manager.c</text>
  <text x="290" y="123" font-size="9" fill="#4466aa">92 KB</text>
  <rect x="68" y="130" width="308" height="16" rx="2" fill="transparent"/>
