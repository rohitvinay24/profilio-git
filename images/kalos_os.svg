  <rect x="68" y="148" width="308" height="16" rx="2" fill="#1e3050"/>
  <text x="78" y="159" font-size="9" fill="#aabbdd">📄  net.c</text>
  <text x="290" y="159" font-size="9" fill="#4466aa">27 KB</text>
  <rect x="68" y="166" width="308" height="16" rx="2" fill="transparent"/>
  <text x="78" y="177" font-size="9" fill="#aabbdd">📄  e1000.c</text>
  <text x="290" y="177" font-size="9" fill="#4466aa">8.8 KB</text>
  <rect x="68" y="184" width="308" height="16" rx="2" fill="#1e3050"/>
  <text x="78" y="195" font-size="9" fill="#aabbdd">📄  acpi.c</text>
