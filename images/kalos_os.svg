  <rect x="0" y="0" width="52" height="468" fill="none" stroke="#2a2a4a" stroke-width="1"/>
  <!-- Sidebar icons -->
  <rect x="8" y="12" width="36" height="36" rx="8" fill="#1a3a6e"/>
  <text x="26" y="36" text-anchor="middle" font-size="18" fill="white">⊞</text>
  <rect x="8" y="58" width="36" height="36" rx="8" fill="#1a4a2a"/>
  <text x="26" y="82" text-anchor="middle" font-size="16" fill="#88ff88">📁</text>
  <rect x="8" y="104" width="36" height="36" rx="8" fill="#3a2a1a"/>
  <text x="26" y="128" text-anchor="middle" font-size="16" fill="#ffaa44">📝</text>
  <rect x="8" y="150" width="36" height="36" rx="8" fill="#2a1a4a"/>
  <text x="26" y="174" text-anchor="middle" font-size="16" fill="#aa88ff">🖥</text>
  <rect x="8" y="196" width="36" height="36" rx="8" fill="#1a2a4a"/>
  <text x="26" y="220" text-anchor="middle" font-size="16" fill="#44aaff">🌐</text>
  <rect x="8" y="242" width="36" height="36" rx="8" fill="#3a1a2a"/>
  <text x="26" y="266" text-anchor="middle" font-size="16" fill="#ff88cc">🎵</text>

