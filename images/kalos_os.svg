  <rect x="395" y="46" width="32" height="194" fill="#111118"/>
  <text x="399" y="58" font-size="8" fill="#334455">1</text><text x="399" y="70" font-size="8" fill="#334455">2</text>
  <text x="399" y="82" font-size="8" fill="#556677">3</text><text x="399" y="94" font-size="8" fill="#334455">4</text>
  <text x="399" y="106" font-size="8" fill="#334455">5</text><text x="399" y="118" font-size="8" fill="#334455">6</text>
