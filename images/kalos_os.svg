  <rect x="427" y="48" width="363" height="12" rx="1" fill="#1a2030"/>
  <text x="430" y="58" font-size="8" fill="#6a9955">/* KalOS x86-64 Kernel — Ring 0 */</text>
  <text x="430" y="70" font-size="8" fill="#569cd6">void</text><text x="448" y="70" font-size="8" fill="#dcdcaa"> kernel_main</text><text x="514" y="70" font-size="8" fill="#cccccc">(uint64_t mb_magic) {</text>
  <text x="430" y="82" font-size="8" fill="#569cd6">    gdt_init</text><text x="472" y="82" font-size="8" fill="#cccccc">(); idt_init();</text>
  <text x="430" y="94" font-size="8" fill="#569cd6">    pci_scan_all</text><text x="490" y="94" font-size="8" fill="#cccccc">();</text>
  <text x="430" y="106" font-size="8" fill="#569cd6">    acpi_init</text><text x="474" y="106" font-size="8" fill="#cccccc">(); apic_init();</text>
  <text x="430" y="118" font-size="8" fill="#569cd6">    vesa_init</text><text x="474" y="118" font-size="8" fill="#cccccc">(); gui_init();</text>
  <text x="430" y="130" font-size="8" fill="#569cd6">    e1000_init</text><text x="478" y="130" font-size="8" fill="#cccccc">(); dhcp_discover();</text>
  <text x="430" y="142" font-size="8" fill="#569cd6">    ahci_init</text><text x="474" y="142" font-size="8" fill="#cccccc">(); shell_loop();</text>
  <text x="430" y="154" font-size="8" fill="#cccccc">}</text>
  <!-- Status bar -->
  <rect x="395" y="240" width="395" height="18" rx="0" fill="#007acc"/>
  <text x="402" y="252" font-size="8" fill="white">NORMAL  |  Ln 1 Col 1  |  kernel.c  |  UTF-8  |  C</text>

