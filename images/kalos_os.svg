  <text x="402" y="314" font-size="8" fill="#4488ff">Arch:</text><text x="432" y="314" font-size="8" fill="#cccccc"> x86-64, Ring 0/3, 4-level paging</text>
  <text x="402" y="326" font-size="8" fill="#4488ff">RAM: </text><text x="432" y="326" font-size="8" fill="#cccccc"> 512 MB detected</text>
