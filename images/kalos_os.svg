  <rect x="395" y="18" width="395" height="28" rx="6" fill="#007acc"/>
  <rect x="395" y="32" width="395" height="14" fill="#007acc"/>
  <text x="405" y="35" font-size="11" fill="white" font-weight="bold">📝  Kal Text Editor — kernel.c</text>
  <circle cx="775" cy="32" r="5" fill="#ff5f56"/><circle cx="760" cy="32" r="5" fill="#ffbd2e"/><circle cx="745" cy="32" r="5" fill="#27c93f"/>
